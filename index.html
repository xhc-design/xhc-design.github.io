<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
    // 1. LIFF 初始化
    async function initializeLiff() {
        try {
            await liff.init({ liffId: "2010634688-4PX2Vuh8" });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                document.getElementById('lineName').value = profile.displayName;
                document.getElementById('lineId').value = profile.userId;
            } else { liff.login(); }
        } catch (err) { console.error("LIFF Fail:", err); }
    }
    initializeLiff();

    // 2. 核心價格資料庫
    const pricingDB = {
        wash: {
            "快速洗車": { "轎車": 500, "休旅車": 800, "商務車": 1000, "加長型": 1000 },
            "快速洗車(買10送1)": { "轎車": 5000, "休旅車": 8000, "商務車": 10000, "加長型": 10000 },
            "精緻洗車": { "轎車": 800, "休旅車": 1000, "商務車": 1300, "加長型": 1300 },
            "精緻洗車(買10送1)": { "轎車": 8000, "休旅車": 10000, "商務車": 13000, "加長型": 13000 },
            "深層洗車": { "轎車": 1000, "休旅車": 1200, "商務車": 1500, "加長型": 1500 },
            "深層洗車(買10送1)": { "轎車": 10000, "休旅車": 12000, "商務車": 15000, "加長型": 15000 },
            "晶鑽洗車": { "轎車": 1500, "休旅車": 1700, "商務車": 2000, "加長型": 2000 },
            "晶鑽洗車(買10送1)": { "轎車": 15000, "休旅車": 17000, "商務車": 20000, "加長型": 20000 }
        },
        coating: {
            "GTECHNIQ CSL 英國白瓶": {
                "一年期": { "轎車": 8000, "休旅車": 9000, "商務車": 10000, "加長型": 12000 },
                "二年期": { "轎車": 18000, "休旅車": 19000, "商務車": 20000, "加長型": 22000 },
                "三年期": { "轎車": 28000, "休旅車": 29000, "商務車": 30000, "加長型": 32000 }
            },
            "R-Pro 高性能石墨稀": {
                "一年期": { "轎車": 10000, "休旅車": 11000, "商務車": 12000, "加長型": 14000 },
                "二年期": { "轎車": 20000, "休旅車": 21000, "商務車": 22000, "加長型": 24000 },
                "三年期": { "轎車": 30000, "休旅車": 31000, "商務車": 32000, "加長型": 34000 }
            },
            "3M 專利有機矽烷": {
                "一年期": { "轎車": 12000, "休旅車": 13000, "商務車": 14000, "加長型": 16000 },
                "二年期": { "轎車": 22000, "休旅車": 23000, "商務車": 24000, "加長型": 26000 },
                "三年期": { "轎車": 32000, "休旅車": 33000, "商務車": 34000, "加長型": 36000 }
            },
            "GTECHNIQ CS 英國黑瓶": {
                "一年期": { "轎車": 15000, "休旅車": 16000, "商務車": 17000, "加長型": 19000 },
                "二年期": { "轎車": 25000, "休旅車": 26000, "商務車": 27000, "加長型": 29000 },
                "三年期": { "轎車": 35000, "休旅車": 36000, "商務車": 37000, "加長型": 39000 }
            },
            "CCP 台灣雙劑型": {
                "一年期": { "轎車": 16000, "休旅車": 17000, "商務車": 18000, "加長型": 20000 },
                "二年期": { "轎車": 26000, "休旅車": 27000, "商務車": 28000, "加長型": 30000 },
                "三年期": { "轎車": 36000, "休旅車": 37000, "商務車": 38000, "加長型": 40000 }
            },
            "Q-Glym 日本複合式": {
                "一年期": { "轎車": 18000, "休旅車": 19000, "商務車": 20000, "加長型": 22000 },
                "二年期": { "轎車": 28000, "休旅車": 29000, "商務車": 30000, "加長型": 32000 },
                "三年期": { "轎車": 38000, "休旅車": 39000, "商務車": 40000, "加長型": 42000 }
            }
        }
    };

    const formatMoney = (num) => num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");

    // 3. 車型觸發與價格渲染
    document.getElementById('carType').addEventListener('change', function() {
        const type = this.value;
        const washSelect = document.getElementById('washSelect');
        const coatingSelect = document.getElementById('coatingSelect');
        const section = document.getElementById('dynamicServiceSection');
        const warning = document.getElementById('typeWarning');
        
        section.classList.remove('opacity-30', 'pointer-events-none');
        if(warning) warning.classList.add('hidden');
        this.classList.remove('border-brand-primary');
        this.classList.add('border-green-500', 'text-green-400');

        washSelect.innerHTML = '<option value="">請選擇洗車方案</option>';
        let washGroup1 = '<optgroup label="單次洗車">';
        let washGroup2 = '<optgroup label="買10送1 超值套裝">';
        for (const [washName, prices] of Object.entries(pricingDB.wash)) {
            const price = prices[type];
            if(price) {
                const optHtml = `<option value="${washName}">[${type}] ${washName} ($${formatMoney(price)})</option>`;
                if(washName.includes("買10送1")) washGroup2 += optHtml;
                else washGroup1 += optHtml;
            }
        }
        washSelect.innerHTML += washGroup1 + '</optgroup>' + washGroup2 + '</optgroup>';

        coatingSelect.innerHTML = '<option value="">選填</option>';
        for (const [coatName, durations] of Object.entries(pricingDB.coating)) {
            let optgroup = `<optgroup label="${coatName}">`;
            for (const [duration, prices] of Object.entries(durations)) {
                const price = prices[type];
                if(price) {
                    optgroup += `<option value="${coatName} ${duration}">[${type}] ${duration} ($${formatMoney(price)})</option>`;
                }
            }
            optgroup += `</optgroup>`;
            coatingSelect.innerHTML += optgroup;
        }
    });

    // 4. 表單防漏攔截與傳輸
    document.getElementById('xhcNativeForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerHTML = '🔄 資料加密傳送中...';
        btn.disabled = true;
        btn.classList.add('opacity-75');

        // 【重要修正 1】：抓取車牌與地址
        const plate = document.getElementById('custPlate').value || '未填寫';
        const address = document.getElementById('custAddress').value || '無';

        // 【重要修正 2】：精準抓取客人看到的完整選項文字
        let selectedServices = [];
        document.querySelectorAll('.service-dropdown').forEach(select => {
            if(select.value && select.value !== "") {
                const selectedText = select.options[select.selectedIndex].text;
                selectedServices.push(`【${select.dataset.label}】${selectedText}`);
            }
        });
        document.querySelectorAll('.service-checkbox:checked').forEach(cb => {
            selectedServices.push(`【加購】${cb.value}`);
        });

        const serviceItems = selectedServices.length > 0 ? selectedServices.join(" + ") : "僅基本預約，現場安排";

        // 【重要修正 3】：強制把車牌與地址綁在服務欄位最前面，保證絕對不會被切掉
        const finalServiceString = `[車牌: ${plate}] [地址: ${address}] || 方案: ${serviceItems}`;

        const formData = {
            name: document.getElementById('custName').value,
            phone: document.getElementById('custPhone').value,
            plate: plate,       // 獨立發送車牌欄位
            address: address,   // 獨立發送地址欄位
            brand: document.getElementById('carBrand').value,
            model: document.getElementById('carModel').value + " (" + document.getElementById('carType').value + ")",
            service: finalServiceString, 
            date: document.getElementById('bookDate').value,
            time: document.getElementById('bookTime').value,
            lineName: document.getElementById('lineName').value || '未透過LINE登入',
            lineId: document.getElementById('lineId').value || '無'
        };

        const GAS_URL = "https://script.google.com/macros/s/AKfycbyfNRe6M7KpE4F5HSSd_JL2jLspmnOPVAK-nM_KlrGnptXiiG-2__KldaMaqTLba_CR/exec";

        fetch(GAS_URL, {
            method: 'POST', mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(formData)
        }).then(() => {
            btn.innerHTML = '✅ 預約成功！專員將盡快聯繫您';
            btn.classList.replace('bg-brand-primary', 'bg-green-600');
            const statusText = document.getElementById('formStatus');
            statusText.innerHTML = '預約單已送出，感謝您選擇 XHC-DESIGN。';
            statusText.classList.remove('hidden', 'text-red-400');
            statusText.classList.add('text-green-400');
            
            setTimeout(() => { 
                document.getElementById('xhcNativeForm').reset(); 
                document.getElementById('dynamicServiceSection').classList.add('opacity-30', 'pointer-events-none');
                document.getElementById('carType').classList.remove('border-green-500', 'text-green-400');
                document.getElementById('carType').classList.add('border-brand-primary');
                btn.innerHTML = '確認送出預約，取得專屬報價'; 
                btn.disabled = false;
                btn.classList.remove('bg-green-600', 'opacity-75');
                btn.classList.add('bg-brand-primary');
            }, 4000);
        }).catch(err => {
            btn.innerHTML = '⚠️ 傳送失敗，請重試';
            btn.disabled = false;
            btn.classList.remove('opacity-75');
        });
    });
</script>
