<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XHC DESIGN 2026 - 旗艦預約系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #050505; color: #ffffff; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .carbon-pattern { background-image: radial-gradient(#111 1px, transparent 1px); background-size: 20px 20px; }
    </style>
</head>
<body class="carbon-pattern">

    <section id="booking" class="py-16">
        <div class="container mx-auto px-6 max-w-6xl">
            <div class="glass-card p-12 rounded-2xl border border-blue-900/30">
                <form id="xhcNativeForm" class="space-y-8">
                    <input type="hidden" id="lineName" value="">
                    <input type="hidden" id="lineId" value="">
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <input type="text" id="custName" required placeholder="車主姓名" class="w-full bg-black/50 border border-white/10 p-3 rounded text-white">
                        <input type="tel" id="custPhone" required placeholder="聯絡電話" class="w-full bg-black/50 border border-white/10 p-3 rounded text-white">
                        <input type="text" id="custPlate" required placeholder="車牌號碼" class="w-full bg-black/50 border border-white/10 p-3 rounded text-white">
                        <input type="text" id="custAddress" placeholder="牽交車地址 (選填)" class="w-full bg-black/50 border border-white/10 p-3 rounded text-white">
                        <select id="carBrand" required class="w-full bg-black/50 border border-white/10 p-3 rounded text-white">
                            <option value="" disabled selected>請選擇品牌</option>
                            <option value="Audi/奧迪">Audi/奧迪</option><option value="BMW/寶馬">BMW/寶馬</option>
                            <option value="Mercedes-Benz/賓士">Mercedes-Benz/賓士</option><option value="Porsche/保時捷">Porsche/保時捷</option>
                        </select>
                        <input type="text" id="carModel" required placeholder="車輛型號" class="w-full bg-black/50 border border-white/10 p-3 rounded text-white">
                        <select id="carType" required class="w-full bg-black border-2 border-blue-600 p-4 rounded text-white font-bold md:col-span-2">
                            <option value="" disabled selected>請選擇車型級距</option>
                            <option value="轎車">轎車</option><option value="休旅車">休旅車/旅行車</option>
                        </select>
                    </div>

                    <div id="dynamicServiceSection" class="opacity-30 pointer-events-none space-y-4">
                        <select id="washSelect" class="service-dropdown w-full bg-black border border-gray-600 p-3 rounded text-white">
                            <option value="">請選擇洗車方案</option>
                        </select>
                        <select id="coatingSelect" class="service-dropdown w-full bg-black border border-gray-600 p-3 rounded text-white">
                            <option value="">鍍膜項目 (選填)</option>
                        </select>
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-5 rounded-xl hover:bg-blue-700 transition-all">確認送出預約，取得專屬報價</button>
                    <div id="formStatus" class="hidden text-center text-green-400 font-bold"></div>
                </form>
            </div>
        </div>
    </section>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        async function initializeLiff() {
            await liff.init({ liffId: "2010634688-4PX2Vuh8" });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                document.getElementById('lineName').value = profile.displayName;
                document.getElementById('lineId').value = profile.userId;
            } else { liff.login(); }
        }
        initializeLiff();

        document.getElementById('xhcNativeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '🔄 系統同步處理中...';
            btn.disabled = true;

            const formData = {
                name: document.getElementById('custName').value,
                phone: document.getElementById('custPhone').value,
                plate: document.getElementById('custPlate').value,
                address: document.getElementById('custAddress').value || '無',
                brand: document.getElementById('carBrand').value,
                model: document.getElementById('carModel').value + " (" + document.getElementById('carType').value + ")",
                service: document.getElementById('washSelect').value + " / " + document.getElementById('coatingSelect').value,
                date: document.getElementById('bookDate')?.value || '未填',
                time: document.getElementById('bookTime')?.value || '未填',
                lineName: document.getElementById('lineName').value,
                lineId: document.getElementById('lineId').value
            };

            const GAS_URL = "https://script.google.com/macros/s/AKfycbxbk66JI7BB628PncvGAcr7z8mMV0BuQcJP4ESXSese5nN39GH-4olphkP72qZ9WCa3/exec";

            fetch(GAS_URL, {
                method: 'POST', mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(formData)
            }).then(() => {
                // 發送給客戶的 LIFF 通知
                if (liff.isInClient()) {
                    liff.sendMessages([{
                        type: 'text',
                        text: `🏎️【XHC-DESIGN 預約確認】\n姓名：${formData.name}\n項目：${formData.service}\n已排入雲端後台，專員將盡快聯繫您。`
                    }]).catch(err => console.error("LIFF 訊息發送失敗", err));
                }
                
                btn.innerHTML = '✅ 預約成功！';
                document.getElementById('formStatus').classList.remove('hidden');
                document.getElementById('formStatus').innerText = '預約資料已送達後台。';
                setTimeout(() => location.reload(), 3000);
            }).catch(err => {
                alert("傳送失敗，請確認網路連線");
                btn.disabled = false;
                btn.innerHTML = '確認送出預約';
            });
        });
    </script>
</body>
</html>
