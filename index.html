<html lang="zh-TW">
<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            primary: '#2563eb',       // 寶藍色 Royal Blue
                            'primary-light': '#60a5fa', 
                            'primary-dark': '#1e3a8a',  
                            dark: '#050505',
                        }
                    }
                }
            }
        }

    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #050505;
            color: #ffffff;
            scroll-behavior: smooth;
        }
        .oswald { font-family: 'Oswald', sans-serif; }
        .hero-gradient { background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(5,5,5,1) 100%); }
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
        }
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: #2563eb; 
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(37, 99, 235, 0.4);
        }
        .carbon-pattern {
            background-image: radial-gradient(#111 1px, transparent 1px);
            background-size: 20px 20px;
            background-color: #050505;
        }
        .nav-scrolled {
            background-color: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(10px);
            padding-top: 0.75rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid rgba(37, 99, 235, 0.3);
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInOpacity {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-on-scroll { opacity: 0; }
        .animated { animation: fadeInUp 0.8s ease-out forwards; }
        .animate-fade-in { animation: fadeInOpacity 0.4s ease-out forwards; }
        .tab-active { color: #2563eb; border-bottom: 2px solid #2563eb; }
    </style>
</head>
